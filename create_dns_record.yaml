version: 1
key: new_dns_record
name: "Create New DNS Record"
description: "Provision a new DNS Record. Options include A, Alias, TXT."
category: "DDI"
manual_duration_minutes: 10
enabled: true
inputs:
  {% include "templates/inputs/standard_change_inputs.yaml" %}

- key: record_type
  label: Record Type
  description: "Type of DNS record to create (A, Alias/CNAME, or TXT)."
  type: choice
  choices:
  - { value: a_record, label: "A Record" }
  - { value: alias_record, label: "Alias Record" }
  - { value: txt_record, label: "TXT Record"}
  required: true

- key: bulk_change
  label: Bulk Change
  description: "Select 'Yes' to submit a list of records, or 'No' for a single record."
  type: choice
  choices:
  - { value: positive, label: "Yes" }
  - { value: negative, label: "No" }
  required: true

- key: tenant
  label: Tenant
  description: "Owning tenant for the record(s)."
  type: choice
  default: SSNC
  choices:
  - { value: SSNC, label: "SSNC" }
  required: False

- key: view
  label: View
  description: "DNS view where the record(s) will be created."
  type: choice
  choices:
  - { value: Enterprise, label: "Enterprise" }
  - { value: Enterprise-Test, label: "Enterprise-Test" }
  - { value: Inet, label: "Inet" }
  - { value: customer, label: "Customer" }
  required: true
  show_if:
    bulk_change: 'negative'

- key: hostname
  label: Hostname
  description: "Host label only (no dots). Example: web1"
  type: string
  required: True
  validators:
  - regex: '^(?!.*intralinks).*$'
    message: "Values containing 'intralinks' are not allowed."
    flags: ["IGNORECASE"]
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: fqdn
  label: FQDN
  description: "Fully qualified domain name. Example: app.ssnc.com"
  type: string
  required: True
  validators:
  - regex: '^(?!.*intralinks).*$'
    message: "Values containing 'intralinks' are not allowed."
    flags: ["IGNORECASE"]
  # validators:
  # - regex: '^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
  #   message: "Use a valid FQDN."
  show_if:
    record_type:
     - alias_record
     - txt_record
    bulk_change: 'negative'

- key: zone
  label: Zone
  description: "Authoritative DNS zone. Example: ssnc.com"
  type: string
  required: True
  validators:
  - regex: '^(?!.*intralinks).*$'
    message: "Values containing 'intralinks' are not allowed."
    flags: ["IGNORECASE"]
  - regex: '^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
    message: "Use a valid Zone."
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: ip_address
  label: IP Address (Optional)
  description: "IPv4 address for the A record (dotted decimal). Example: 10.10.1.1"
  type: string
  required: false
  validators:
   - regex: '^(?!0)(?!.*\.$)(?!.*\.\.)([0-9]{1,3}\.){3}[0-9]{1,3}$'
     message: "Use a valid IP address."
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: network
  label: Network (Optional)
  description: "Network IP (IPv4) to allocate from when IP Address is not provided. Example: 10.10.1.0"
  type: string
  required: False
  validators:
   - regex: '^(?!0)(?!.*\.$)(?!.*\.\.)([0-9]{1,3}\.){3}[0-9]{1,3}$'
     message: "Use a valid IP address."
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: ip_name
  label: IP Name (Optional)
  description: "Optional name/label for the allocated IP."
  type: string
  required: False
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: bypass_ping
  label: Bypass Ping
  description: "If enabled, skips ping checks before IP assignment."
  type: boolean
  default: false
  show_if:
    bulk_change: 'negative'
    record_type: a_record

- key: proxied
  label: Proxied
  description: "If enabled, create proxied record when supported."
  type: boolean
  default: false
  show_if:
    bulk_change: 'negative'
    record_type: a_record


- key: alias_type
  label: Alias Type (Optional)
  description: "Optional alias classification (generic, local_lb, or global_lb)."
  type: choice
  required: False
  choices:
  - { value: generic, label: "generic" }
  - { value: local_lb, label: "local_lb" }
  - { value: global_lb, label: "global_lb" }
  show_if:
    record_type: alias_record

- key: alias
  label: Alias
  description: "Alias name (CNAME) that will point to the FQDN. Example: alias.ssnc.com"
  type: string
  required: True
  validators:
  - regex: '^(?!.*intralinks).*$'
    message: "Values containing 'intralinks' are not allowed."
    flags: ["IGNORECASE"]
  - regex: '^(?:\*\.)?(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
    message: "Use a valid Alias."
  show_if:
    record_type: alias_record
    bulk_change: 'negative'

- key: data
  label: Data
  description: "TXT record string value."
  type: string
  required: True
  validators:
  - regex: '^(?!.*intralinks).*$'
    message: "Values containing 'intralinks' are not allowed."
    flags: ["IGNORECASE"]
  show_if:
    record_type: txt_record
    bulk_change: 'negative'

- key: a_record_list
  label: A Record List
  description: |
    Provide one row per A record.
  type: listdict
  required: true
  columns:
  - key: view
    label: View
    type: choice
    required: true
    choices:
    - { value: Enterprise, label: "Enterprise" }
    - { value: Enterprise-Test, label: "Enterprise-Test" }
    - { value: Inet, label: "Inet" }
    - { value: customer, label: "Customer" }
  - key: hostname
    label: Hostname
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)*$'
      message: "Use a valid hostname."
  - key: zone
    label: Zone
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
      message: "Use a valid Zone."
  - key: ip
    label: IP Address
    type: string
    required: true
    validators:
    - regex: '^(?!0)(?!.*\.$)(?!.*\.\.)([0-9]{1,3}\.){3}[0-9]{1,3}$'
      message: "Use a valid IP address."
  - key: proxied
    label: Proxied
    type: boolean
    required: false
  show_if:
    bulk_change: 'positive'
    record_type: a_record

- key: alias_record_list
  label: Alias Record List
  description: |
    Provide one row per alias record.
  type: listdict
  required: true
  columns:
  - key: view
    label: View
    type: choice
    required: true
    choices:
    - { value: Enterprise, label: "Enterprise" }
    - { value: Enterprise-Test, label: "Enterprise-Test" }
    - { value: Inet, label: "Inet" }
    - { value: customer, label: "Customer" }
  - key: fqdn
    label: FQDN
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
      message: "Use a valid FQDN."
  - key: alias
    label: Alias
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^(?:\*\.)?(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
      message: "Use a valid Alias."
  show_if:
    bulk_change: 'positive'
    record_type: alias_record

- key: txt_record_list
  label: Txt Record List
  description: |
    Provide one row per TXT record.
  type: listdict
  required: true
  columns:
  - key: view
    label: View
    type: choice
    required: true
    choices:
    - { value: Enterprise, label: "Enterprise" }
    - { value: Enterprise-Test, label: "Enterprise-Test" }
    - { value: Inet, label: "Inet" }
    - { value: customer, label: "Customer" }
  - key: fqdn
    label: FQDN
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})+\.?$'
      message: "Use a valid FQDN."
  - key: data
    label: Data
    type: string
    required: true
    validators:
    - regex: '^(?!.*intralinks).*$'
      message: "Values containing 'intralinks' are not allowed."
      flags: ["IGNORECASE"]
    - regex: '^.+$'
      message: "Data cannot be empty."
  show_if:
    bulk_change: 'positive'
    record_type: txt_record

actions:
  - type: nautobot
    name: verify_snow
    script: scripts/verify_change.py
    with:
      change_id: "{{ inputs.change_id }}"

  - type: nautobot
    name: notify_snow_fail
    script: scripts/notify_email.py
    with:
      to_email: "{{ user.email }}"
      subject: "{{ inputs.change_id }}: DNS Record Creation"
      body: |
        Your DNS record creation workflow was aborted.
        Reason: {{ results.verify_snow.return_value.reason if (results.verify_snow is defined) else 'Unknown' }}
    when: "{{ results.verify_snow is defined and results.verify_snow.return_value.result == false }}"

  - type: nautobot
    name: abort_snow
    script: scripts/fail_workflow.py
    with:
      message: "Change verification failed; workflow aborted after notification."
    when: "{{ results.verify_snow is defined and results.verify_snow.return_value.result == false }}"

  - type: nautobot
    name: create_dns
    script: scripts/create_dns_record.py
    with:
      record_type: "{{ inputs.record_type }}"
      tenant: "{{ inputs.tenant }}"
      view: "{{ inputs.view }}"
      hostname: "{{ inputs.hostname }}"
      fqdn: "{{ inputs.fqdn }}"
      zone: "{{ inputs.zone }}"
      ip_address: "{{ inputs.ip_address }}"
      network: "{{ inputs.network }}"
      ip_name: "{{ inputs.ip_name }}"
      bypass_ping: "{{ inputs.bypass_ping }}"
      proxied: "{{ inputs.proxied }}"
      alias_type: "{{ inputs.alias_type }}"
      alias: "{{ inputs.alias }}"
      data: "{{ inputs.data }}"
      a_record_list: "{{ inputs.a_record_list }}"
      alias_record_list: "{{ inputs.alias_record_list }}"
      txt_record_list: "{{ inputs.txt_record_list }}"
      bulk_change: "{{ inputs.bulk_change }}"
    when: "{{ results.verify_snow is defined and results.verify_snow.return_value.result == true }}"

  - type: nautobot
    name: notify_ok
    script: scripts/notify_email.py
    with:
      to_email: "{{ user.email }}"
      subject: "{{ inputs.change_id }}: DNS Record Creation Successful"
      body: |
        Your DNS record creation workflow has completed successfully.
        Details:
        - SNOW Ticket: {{ inputs.change_id }}
        - Record Type: {{ inputs.record_type }}
    when: "{{ inputs.bulk_change == 'negative' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) == 200 }}"

  - type: nautobot
    name: notify_fail
    script: scripts/notify_email.py
    with:
      to_email: "{{ user.email }}"
      subject: "{{ inputs.change_id }}: DNS Record Creation Failed"
      body: |
        Your DNS record creation workflow has failed with status.
        Details:
        - SNOW Ticket: {{ inputs.change_id }}
        - Record Type: {{ inputs.record_type }}
        - Status Code: {{ results.create_dns.return_value.status_code | default(500) }}
        - Notes: {{ results.create_dns.return_value.user_message | default('No details provided') }}
    when: "{{ inputs.bulk_change == 'negative' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) >= 300 }}"

  - type: nautobot
    name: fail_action
    script: scripts/fail_workflow.py
    with:
      message: "DNS record creation failed (status={{ results.create_dns.return_value.status_code|default(500) }})"
    when: "{{ inputs.bulk_change == 'negative' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) >= 300 }}"

  - type: nautobot
    name: notify_bulk_ok
    script: scripts/notify_email.py
    with:
      to_email: "{{ user.email }}"
      subject: "{{ inputs.change_id }}: Bulk DNS Record Creation Result Successful"
      body: |
        Your DNS record creation workflow has completed. Results are below:
        Details:
        - SNOW Ticket: {{ inputs.change_id }}
        - Record Type: {{ inputs.record_type }}
        - Notes: {{ results.create_dns.return_value.user_message if (results.create_dns is defined) else '' }}
    when: "{{ inputs.bulk_change == 'positive' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) == 200 }}"

  - type: nautobot
    name: notify_bulk_partial
    script: scripts/notify_email.py
    with:
      to_email: "{{ user.email }}"
      subject: "{{ inputs.change_id }}: Bulk DNS Record Creation Result Partial/Total Failure"
      body: |
        Your DNS record creation workflow has completed with partial/total failures. Results are below:
        Details:
        - SNOW Ticket: {{ inputs.change_id }}
        - Record Type: {{ inputs.record_type }}
        - Notes: {{ results.create_dns.return_value.user_message | default('No details provided') }}
    when: "{{ inputs.bulk_change == 'positive' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) == 400 }}"

  - type: nautobot
    name: fail_bulk
    script: scripts/fail_workflow.py
    with:
      message: "Bulk DNS creation failed (status={{ results.create_dns.return_value.status_code|default(500) }})"
    when: "{{ inputs.bulk_change == 'positive' and results.create_dns is defined and (results.create_dns.return_value.status_code|default(500)) >= 300 }}"